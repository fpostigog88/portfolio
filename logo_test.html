<!DOCTYPE html>
<html>
<head>
<style>
body { background: #f5f5f0; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 200px; }
.item { display: flex; flex-direction: column; align-items: center; gap: 6px; background: white; padding: 10px; border-radius: 8px; }
.item img { width: 28px; height: 28px; object-fit: contain; }
.item span { font-size: 12px; color: #333; }
</style>
</head>
<body>
<div class="grid">
  <div class="item"><img src="logo_dell.png"><span>Dell</span></div>
  <div class="item"><img src="logo_moller.png"><span>Moller</span></div>
  <div class="item"><img src="logo_michigan.svg"><span>Michigan</span></div>
  <div class="item"><img src="logo_uc.svg"><span>UC</span></div>
</div>
</body>
</html>
