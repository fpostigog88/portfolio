<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecruiterOS - Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #f5f3ef;
            color: #1e3a4c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .login-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .login-sub {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e3a4c;
        }
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        input[type="password"]:focus {
            border-color: #1e3a4c;
        }
        .signin-btn {
            width: 100%;
            padding: 11px;
            background: #1e3a4c;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }
        .signin-btn:hover { background: #2a4f68; }
        .error-msg {
            color: #c0392b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">RecruiterOS</div>
        <div class="login-sub">Internal recruiter intelligence cockpit</div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Access password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" class="signin-btn">Sign in</button>
            <div class="error-msg" id="errorMsg">Incorrect password. Try again.</div>
        </form>
    </div>
    <script>
        const DEMO_PASS = "recruiterosdemo";
        function handleLogin(e) {
            e.preventDefault();
            const pw = document.getElementById("password").value;
            if (pw === DEMO_PASS) {
                localStorage.setItem("ros_auth", DEMO_PASS);
                window.location.replace("/lazio/jobs");
            } else {
                document.getElementById("errorMsg").style.display = "block";
                document.getElementById("password").value = "";
            }
        }
    </script>
</body>
</html>
