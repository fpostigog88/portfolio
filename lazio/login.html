<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecruiterOS - Sign in</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f5f3ef;
            color: #1e3a4c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 40px 36px;
            border-radius: 12px;
            border: 1px solid #e0dbd4;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 360px;
        }
        .login-box .kicker {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #7a5a3a;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .login-box h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1e3a4c;
            margin: 0 0 6px;
        }
        .login-box .subtitle {
            font-size: 13px;
            color: #888;
            margin: 0 0 28px;
        }
        .login-box label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .login-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fafaf8;
            transition: border-color 0.15s;
            margin-bottom: 8px;
        }
        .login-box input:focus {
            border-color: #1e3a4c;
        }
        .login-box input.error {
            border-color: #e53;
        }
        .login-box .error-msg {
            color: #e53;
            font-size: 12px;
            margin: 0 0 12px;
            display: none;
        }
        .login-box .error-msg.show {
            display: block;
        }
        .login-box button {
            width: 100%;
            padding: 11px;
            background: #1e3a4c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .login-box button:hover {
            background: #2a4a5c;
        }
        .login-box button:disabled {
            background: #9ab;
            cursor: not-allowed;
        }
        .login-box .hint {
            font-size: 11px;
            color: #bbb;
            text-align: center;
            margin: 16px 0 0;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="kicker">RecruiterOS</div>
        <h1>Sign in</h1>
        <p class="subtitle">Internal prototype access</p>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" autofocus>
            <p class="error-msg" id="errorMsg">Incorrect password. Try: recruiterosdemo</p>
            <button type="submit" id="submitBtn">Sign in</button>
        </form>
        <p class="hint">Demo: recruiterosdemo</p>
    </div>

    <script>
        var DEMO_PASS = 'recruiterosdemo';

        // Already logged in? Redirect directly
        if (localStorage.getItem('ros_auth') === DEMO_PASS) {
            window.location.replace('/lazio/jobs');
        }

        function handleLogin(e) {
            e.preventDefault();
            var password = document.getElementById('password').value;
            var errorMsg = document.getElementById('errorMsg');
            var submitBtn = document.getElementById('submitBtn');
            var passwordInput = document.getElementById('password');

            errorMsg.classList.remove('show');
            passwordInput.classList.remove('error');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';

            // Small fake delay for feel
            setTimeout(function() {
                if (password === DEMO_PASS) {
                    localStorage.setItem('ros_auth', DEMO_PASS);
                    window.location.replace('/lazio/jobs');
                } else {
                    errorMsg.classList.add('show');
                    passwordInput.classList.add('error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign in';
                    document.getElementById('password').focus();
                }
            }, 500);
        }
    </script>
</body>
</html>
